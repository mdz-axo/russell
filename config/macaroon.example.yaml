# Russell Macaroon Client Configuration
#
# This configuration enables Russell to use macaroons for authentication
# with external MCP servers and the Okapi inference engine.
#
# Location: ~/.config/russell/config.yaml

remote:
  mcp_endpoint: http://127.0.0.1:8080/mcp
  agent_id: russell-prod-1

macaroon:
  storage: file

  file:
    path: ~/.config/russell/macaroons.json
    encryption: aes-256-gcm
    encryption_key_env: RUSSELL_MACAROON_KEY

  auto_refresh:
    enabled: true
    before_expiry: 1h
    retry:
      max_attempts: 3
      backoff_seconds: 30

  discharge:
    endpoint: http://127.0.0.1:8080/mcp/v1/discharge
    auto_request: true
    cache:
      enabled: true
      ttl: 30m

  okapi:
    endpoint: http://127.0.0.1:11435
    binding:
      enabled: true
      auto_bind: true

  audit:
    enabled: true
    log_file: ~/.config/russell/logs/macaroon_audit.log
    retention_days: 30
    events:
      - macaroon_stored
      - macaroon_loaded
      - macaroon_attenuated
      - discharge_requested
      - discharge_bound
      - mcp_tool_invoked
      - auth_failure

  security:
    require_tls: true
    allow_localhost: true
    validate:
      check_expiration: true
      warn_before_expiry: 30m
      require_caveats:
        - iid
        - before
        - skill

cli:
  format: table
  verbose: false
  color: auto

development:
  debug: false
  skip_tls_verify: false
  use_file_storage: false
  mock: false
