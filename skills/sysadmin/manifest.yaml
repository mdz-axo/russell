# SPDX-License-Identifier: MIT OR Apache-2.0
# sysadmin — host maintenance toolkit for Russell.
#
# Bundles systemd unit remediation, zombie reaping, clock sync,
# journal hygiene, coredump cleanup, and swap/mount inspection.
#
# This is a *mutation* skill — every intervention satisfies IDRS.
# Jack proposes; the operator consents; the dispatcher executes.
#
# Install: copy this directory to ~/.local/share/harness/skills/sysadmin/

id: sysadmin
version: 0.1.0
authored: 2026-05-12
min_harness_version: 0.1.0

symptoms:
  - zombie_accumulation
  - clock_skew
  - systemd_timer_misfire
  - journal_bloat
  - process_table_bloat
  - swap_retention
  - coredump_accumulation
  - stale_mount
  - systemd_service_degraded

applies_when:
  - os_family: linux

probes:
  # --- Systemd -------------------------------------------------------
  - id: probe-systemd-failed
    cmd: ["bash", "./scripts/probe-systemd-failed.sh"]
    capture: stdout
    timeout: 10s

  - id: probe-systemd-degraded
    cmd: ["bash", "./scripts/probe-systemd-degraded.sh"]
    capture: stdout
    timeout: 10s

  # --- Clock (NTP) ---------------------------------------------------
  - id: probe-clock-offset
    cmd: ["bash", "./scripts/probe-clock-offset.sh"]
    capture: stdout
    timeout: 10s

  # --- Zombies -------------------------------------------------------
  - id: probe-zombies
    cmd: ["bash", "./scripts/probe-zombies.sh"]
    capture: stdout
    timeout: 10s

  # --- Journal -------------------------------------------------------
  - id: probe-journal-size
    cmd: ["bash", "./scripts/probe-journal-size.sh"]
    capture: stdout
    timeout: 10s

  # --- Coredumps -----------------------------------------------------
  - id: probe-coredumps
    cmd: ["bash", "./scripts/probe-coredumps.sh"]
    capture: stdout
    timeout: 10s

  # --- Swap ----------------------------------------------------------
  - id: probe-swap-detail
    cmd: ["bash", "./scripts/probe-swap-detail.sh"]
    capture: stdout
    timeout: 10s

  # --- Stale mounts --------------------------------------------------
  - id: probe-stale-mounts
    cmd: ["bash", "./scripts/probe-stale-mounts.sh"]
    capture: stdout
    timeout: 10s

  # --- Remote services -------------------------------------------------
  - id: probe-remote-services
    cmd: ["bash", "./scripts/probe-remote-services.sh"]
    capture: stdout
    timeout: 10s

interventions:
  # --- Systemd -------------------------------------------------------
  - id: systemd-reset-failed
    cmd: ["systemctl", "--user", "reset-failed"]
    risk: low
    idempotent: true
    rollback: none_needed
    timeout: 15s
    needs_sudo: false

  - id: systemd-reset-failed-system
    cmd: ["systemctl", "reset-failed"]
    risk: low
    idempotent: true
    rollback: none_needed
    timeout: 15s
    needs_sudo: true

  # --- Clock sync ----------------------------------------------------
  - id: force-clock-sync
    cmd: ["bash", "./scripts/force-clock-sync.sh"]
    risk: medium
    idempotent: true
    rollback: none_needed
    timeout: 30s
    needs_sudo: true

  # --- Zombie reaping ------------------------------------------------
  - id: reap-zombies
    cmd: ["bash", "./scripts/reap-zombies.sh"]
    risk: medium
    idempotent: true
    rollback: none_needed
    timeout: 30s
    needs_sudo: false

  # --- Journal hygiene -----------------------------------------------
  - id: journal-vacuum
    cmd: ["journalctl", "--user", "--vacuum-size=500M"]
    risk: low
    idempotent: true
    rollback: none_needed
    timeout: 30s
    needs_sudo: false

  - id: journal-vacuum-system
    cmd: ["journalctl", "--vacuum-size=500M"]
    risk: low
    idempotent: true
    rollback: none_needed
    timeout: 30s
    needs_sudo: true

  # --- Coredump cleanup ----------------------------------------------
  - id: remove-coredumps
    cmd: ["bash", "./scripts/remove-coredumps.sh"]
    risk: low
    idempotent: true
    rollback: none_needed
    timeout: 15s
    needs_sudo: true

  # --- Swap flush (drop caches + swapoff/swapon) --------------------
  - id: flush-swap
    cmd: ["bash", "./scripts/flush-swap.sh"]
    risk: medium
    idempotent: true
    rollback: none_needed
    timeout: 300s
    needs_sudo: true

safety:
  max_auto_risk: medium
  require_human_for:
    - flush-swap
    - force-clock-sync
