# P2: Affirmative Consent — Assertion Manifest
# Verifies default-deny, scoped/versioned/expiring consent, hierarchical
# structures, and fail-closed behavior.

principle: affirmative_consent
version: "0.1.0"
description: >
  Default is deny. Nothing passes without an explicit yes. Consent is
  scoped, versioned, and expiring. Structures are hierarchical.
  Misconfiguration defaults to deny.

assertions:
  - id: p2a
    name: default_deny
    claim: "Default is deny — no access without explicit consent grant"
    method: structural + behavioral
    targets:
      - crate: russell-core
        module: sovereignty
        methods: [DenyAllConsent, default_deny, deny_all]
        gate: DenyAllConsent
      - crate: russell-session
        module: engine
        methods: [grant_consent, check_consent, ConsentStatus]
        gate: ConsentStatus

  - id: p2b
    name: scoped_consent
    claim: "Consent grants are scoped to specific categories and resource versions"
    method: structural_audit
    targets:
      - crate: russell-session
        module: engine
        methods: [ConsentGrant, ConsentScope, PerSkill]
        gate: ConsentScope
      - crate: russell-core
        module: sovereignty
        methods: [OperatorConsent, ConsentScope]
        gate: ConsentScope

  - id: p2c
    name: expiring_consent
    claim: "Consent grants expire by date or resource version upgrade"
    method: structural + behavioral
    targets:
      - crate: russell-session
        module: engine
        methods: [grant_consent, expires_at, VersionMismatch]
        gate: ConsentGrant
      - crate: russell-core
        module: sovereignty
        methods: [OperatorConsent, expires_at]
        gate: OperatorConsent

  - id: p2d
    name: hierarchical_consent
    claim: "Consent structures are hierarchical (master → per-skill → per-action-type)"
    method: structural_audit
    targets:
      - crate: russell-session
        module: session
        methods: [ConsentStatus, consent_flow]
        gate: ConsentStatus
      - crate: russell-core
        module: sovereignty
        methods: [OperatorConsent, ConsentScope]
        gate: ConsentScope

  - id: p2e
    name: fail_closed
    claim: "Fail-closed: misconfiguration or missing wiring defaults to deny"
    method: behavioral_probe
    targets:
      - crate: russell-core
        module: sovereignty
        methods: [SovereigntyChecker, require_sovereignty]
        gate: deny_all
      - crate: russell-session
        module: engine
        methods: [ConsentStatus, Denied]
        gate: deny_all
