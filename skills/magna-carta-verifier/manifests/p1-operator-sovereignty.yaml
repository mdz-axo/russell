# P1: Operator Sovereignty — Assertion Manifest
# Verifies that the operator controls their data and every sovereign
# path is gated by SovereigntyChecker.

principle: operator_sovereignty
version: "0.1.0"
description: >
  The operator controls their data. Every code path to sovereign data is
  gated by SovereigntyChecker. Non-owner access is denied. Resources are
  correctly categorized before harness entry. Sovereign data is portable
  and not locked into proprietary formats. Consent terms are atomic.

assertions:
  - id: p1a
    name: sovereign_data_gated
    claim: "Every code path to sovereign data is gated by SovereigntyChecker"
    method: structural_audit
    targets:
      - crate: russell-core
        module: sovereignty
        methods: [SovereigntyChecker, require_sovereignty, russell_default]
        gate: require_sovereignty
      - crate: russell-acp-server
        module: handler
        methods: [sovereignty, require_sovereignty]
        gate: require_sovereignty

  - id: p1b
    name: non_owner_denied
    claim: "Non-owner access to sovereign data is denied"
    method: behavioral_probe
    targets:
      - crate: russell-core
        module: sovereignty
        methods: [SovereigntyChecker, require_sovereignty]
        gate: deny_all
      - crate: russell-skills
        module: dispatch
        methods: [sovereignty, require_sovereignty]
        gate: deny_all

  - id: p1c
    name: resource_categorization
    claim: "Every resource is correctly categorized before harness entry"
    method: resource_verification
    targets:
      - crate: russell-core
        module: sovereignty
        methods: [DataSovereigntyBoundary, DataCategory, categorize]
        gate: DataSovereigntyBoundary

  - id: p1d
    name: data_portability
    claim: "Sovereign data is portable and not locked into proprietary format"
    method: structural_audit
    targets:
      - crate: russell-cli
        module: commands::digest
        methods: [daily_log, digest]
        gate: digest
      - crate: russell-core
        module: journal
        methods: [recent, reader]
        gate: JournalReader

  - id: p1e
    name: atomic_consent
    claim: "Consent terms are atomic — unbundled, specific, ≤5 sentences per term"
    method: structural_audit
    targets:
      - crate: russell-session
        module: engine
        methods: [ConsentGrant, ConsentStatus, grant_consent, revoke_consent]
        gate: ConsentGrant
      - crate: russell-core
        module: sovereignty
        methods: [OperatorConsent, ConsentScope]
        gate: OperatorConsent
