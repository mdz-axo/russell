# P4: Clear Boundaries (OCAP) — Assertion Manifest
# Verifies dual enforcement gates, unforgeable/attenuating tokens,
# consent-gated settings access, and open settings for providers.

principle: clear_boundaries
version: "0.1.0"
description: >
  Every access path goes through require_capability + require_sovereignty.
  Capability tokens are unforgeable and attenuating — no bypass exists.
  Generative settings tokens are obtainable through P2 consent.
  Connected inference providers expose settings.

assertions:
  - id: p4a
    name: dual_gate
    claim: "Every access path goes through require_capability + require_sovereignty"
    method: structural_audit
    targets:
      - crate: russell-acp-server
        module: auth
        methods: [CapabilityToken, validate_token, has_capability]
        gate: CapabilityToken
      - crate: russell-core
        module: sovereignty
        methods: [SovereigntyChecker, require_sovereignty]
        gate: require_sovereignty
      - crate: russell-skills
        module: dispatch
        methods: [validate_command_path, sovereignty]
        gate: sovereignty

  - id: p4b
    name: unforgeable_tokens
    claim: "Capability tokens are unforgeable and attenuating — no bypass exists"
    method: structural_audit
    targets:
      - crate: russell-acp-server
        module: auth
        methods: [CapabilityToken, validate_token, attenuation_kind]
        gate: CapabilityToken
      - crate: russell-acp-server
        module: auth
        methods: [replay_protection, token_revocation]
        gate: replay_protection

  - id: p4c
    name: consent_gated_settings
    claim: "Generative settings tokens obtainable through P2's affirmative consent"
    method: structural_audit
    targets:
      - crate: russell-acp-server
        module: handler
        methods: [consent_respond, run_skill]
        gate: consent_respond
      - crate: russell-session
        module: engine
        methods: [grant_consent, check_consent]
        gate: ConsentGrant

  - id: p4d
    name: open_settings
    claim: "Connected inference providers expose settings (open-source requirement)"
    method: structural_audit
    targets:
      - crate: russell-meta
        module: oai_client
        methods: [OkapiClient, chat, resolve_and_correct_model]
        gate: OkapiClient
      - crate: russell-meta
        module: client
        methods: [ClientConfig, SoapPrompt]
        gate: ClientConfig
