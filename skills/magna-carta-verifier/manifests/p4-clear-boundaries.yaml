# P4: Clear Boundaries (OCAP) — Assertion Manifest
# Verifies dual enforcement gates, unforgeable/attenuating tokens,
# consent-gated settings access, and open settings for providers.

principle: clear_boundaries
version: "0.1.0"
description: >
  Every access path goes through require_capability + require_sovereignty.
  Capability tokens are unforgeable and attenuating — no bypass exists.
  Generative settings tokens are obtainable through P2 consent.
  Connected inference providers expose settings.

assertions:
  - id: p4a
    name: dual_gate
    claim: "Every access path goes through require_capability + require_sovereignty"
    method: structural + behavioral
    targets:
      - crate: russell-capability
        module: capability::gate
        methods: [require_capability, check_capability]
        gate: require_capability
      - crate: russell-sovereignty
        module: sovereignty::gate
        methods: [require_sovereignty, check_sovereignty]
        gate: require_sovereignty
      - crate: russell-journal
        module: journal::writer
        methods: [store_sample, store_evidence]
        gate: require_capability

  - id: p4b
    name: unforgeable_tokens
    claim: "Capability tokens are unforgeable and attenuating — no bypass exists"
    method: structural_audit
    targets:
      - crate: russell-capability
        module: capability::token
        methods: [validate_token, delegate_attenuated, verify_unforgeable]
        gate: no_bypass
      - crate: russell-capability
        module: capability::gate
        methods: [require_capability, check_no_admin_override]
        gate: no_bypass

  - id: p4c
    name: consent_gated_settings
    claim: "Generative settings tokens obtainable through P2's affirmative consent"
    method: structural_audit
    targets:
      - crate: russell-capability
        module: capability::token
        methods: [obtain_via_consent, settings_capability_token]
        gate: require_consent
      - crate: russell-consent
        module: consent::bridge
        methods: [consent_to_capability, bridge_settings_token]
        gate: require_consent

  - id: p4d
    name: open_settings
    claim: "Connected inference providers expose settings (open-source requirement)"
    method: structural_audit
    targets:
      - crate: russell-meta
        module: meta::provider
        methods:
          [expose_settings, verify_provider_openness, list_provider_settings]
        gate: open_source_check
      - crate: russell-meta
        module: meta::inference
        methods: [provider_settings, check_exposure]
        gate: open_source_check
