# Skill manifest for skill-manager
# Enables Jack to build, install, prune, retire, and restore skills autonomously.
# See ADR-0024 and docs/architecture/skill-self-management-strategy.md.

id: skill-manager
version: 0.1.0
authored: 2026-05-22
min_harness_version: 0.20.0

kind: actionable

symptoms:
  - capability_gap
  - skill_stale
  - skill_missing

applies_when:
  - os_family: linux

probes:
  - id: list-skills
    cmd: ["bash", "./scripts/list-skills.sh"]
    timeout: 5s
  - id: stats
    cmd: ["bash", "./scripts/skill-stats.sh"]
    timeout: 5s
  - id: check
    cmd: ["bash", "./scripts/skill-check.sh"]
    timeout: 10s
  - id: registry-status
    cmd: ["bash", "./scripts/registry-status.sh"]
    timeout: 5s

interventions:
  - id: build
    cmd: ["bash", "./scripts/build-skill.sh"]
    risk: low
    idempotent: true
    rollback: none_needed
    needs_sudo: false
  - id: install
    cmd: ["bash", "./scripts/install-skill.sh"]
    risk: low
    idempotent: true
    rollback: none_needed
    needs_sudo: false
  - id: prune
    cmd: ["bash", "./scripts/prune-skill.sh"]
    risk: low
    idempotent: true
    rollback: restore
    needs_sudo: false
  - id: restore
    cmd: ["bash", "./scripts/restore-skill.sh"]
    risk: low
    idempotent: true
    rollback: prune
    needs_sudo: false
  - id: retire
    cmd: ["bash", "./scripts/retire-skill.sh"]
    risk: medium
    idempotent: true
    rollback: restore-from-archive
    needs_sudo: false
  - id: restore-from-archive
    cmd: ["bash", "./scripts/restore-from-archive.sh"]
    risk: medium
    idempotent: true
    rollback: retire
    needs_sudo: false

safety:
  max_auto_risk: low
  require_human_for:
    - retire
    - restore-from-archive

evaluation:
  after_intervention:
    - id: verify-skill-exists
      cmd: ["bash", "./scripts/verify-skill.sh"]
      timeout: 5s
      expect_exit: 0

references:
  - docs/adr/0024-skill-self-management.md
  - docs/architecture/skill-self-management-strategy.md