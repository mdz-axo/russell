# okapi-watcher — monitor local Okapi instance health and model inventory.
#
# Install: copy this directory to ~/.local/share/harness/skills/okapi-watcher/

id: okapi-watcher
version: 0.2.0
authored: 2026-05-10
min_harness_version: 0.1.0

symptoms:
  - llm_slow
  - resource_exhaustion

applies_when:
  - os_family: linux

probes:
  - id: probe-health
    cmd: ["bash", "./scripts/probe-health.sh"]
    capture: stdout
    timeout: 10s
  - id: probe-models
    cmd: ["bash", "./scripts/probe-models.sh"]
    capture: stdout
    timeout: 10s

interventions:
  - id: restart-okapi
    cmd: ["systemctl", "--user", "restart", "okapi"]
    risk: low
    idempotent: true
    rollback: none_needed
    timeout: 30s

safety:
  max_auto_risk: low

references:
  - ~/Clones/Okapi/AGENTS.md
