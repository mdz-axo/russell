# Symptom catalog for Russell skills.
#
# This is the runtime-loadable version of the symptom vocabulary.
# Skills reference these names in their `symptoms:` field.
# Adding a symptom here makes it available without recompilation.
#
# Governed by ADR-0024. A manifest's `symptoms:` entry not in this
# set causes a LoadError::UnknownSymptom at load time (poka-yoke).

