# SPDX-License-Identifier: MIT OR Apache-2.0
# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [{ triple = "x86_64-unknown-linux-gnu" }]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # proc-macro-error2 — unmaintained fork; transitive via age → i18n-embed-fl
    "RUSTSEC-2026-0173",
    # sodiumoxide — deprecated; transitive via macaroon → russell-acp-server
    "RUSTSEC-2021-0137",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "MIT-0",
    "Unlicense",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
