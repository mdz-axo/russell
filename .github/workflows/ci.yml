# Russell CI — enforces the gates from MVP_SPEC.md §2.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test + deny
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Build MCP servers (verify Kask integration compiles)
        run: |
          if [ -d "$HOME/Clones/kask" ]; then
            cd "$HOME/Clones/kask"
            cargo check -p arsenal-mcp-russell -p arsenal-mcp-okapi-metrics
          else
            echo "Kask repo not present — skipping MCP build check"
          fi

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check
        run: cargo deny check
