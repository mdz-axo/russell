# Russell CI — enforces the gates from MVP_SPEC.md §2.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test + deny
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Verify release build
        run: cargo build --release -p russell-cli -p russell-acp-server

      - name: Verify install script is valid
        run: |
          bash -n install.sh
          bash -n docs/deployment/install.sh
          grep -q 'russell-cli' install.sh
          grep -q 'russell-acp-server' install.sh

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check
        run: cargo deny check

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: cargo check (MSRV)
        run: cargo check --workspace
